<body class="page-transition">

<div class="gs-brand">
  <h1>🌱 Grameen Setu</h1>
  <p>Farmer-first B2B marketplace</p>
</div>

<div class="gs-wrap">
  <div class="gs-tabs">
    <button class="gs-tab active" id="tab-login" onclick="switchTab('login')">Log In</button>
    <button class="gs-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- Login Form -->
  <div id="form-login" class="gs-form">
    <h2>Welcome back</h2>
    <div class="gs-field">
      <i class="far fa-envelope gs-icon"></i>
      <input type="email" id="loginEmail" name="email_<?php echo rand(); ?>" placeholder="your@email.com" autocomplete="new-password">
    </div>
    <div class="gs-field">
      <i class="fas fa-lock gs-icon"></i>
      <input type="password" id="loginPassword" name="pwd_<?php echo rand(); ?>" placeholder="Password" autocomplete="new-password">
    </div>
    <div class="gs-row">
      <label><input type="checkbox"> Remember me</label>
      <a href="#">Forgot password?</a>
    </div>
    <div class="gs-error" id="loginError"></div>
    <button class="gs-btn" onclick="doLogin()">Log in</button>
  </div>

  <!-- Signup Form -->
  <div id="form-signup" class="gs-form hidden">
    <h2>Create account</h2>
    <div class="gs-field">
      <i class="fas fa-user gs-icon"></i>
      <input type="text" id="signupName" placeholder="Full name">
    </div>
    <div class="gs-field">
      <i class="far fa-envelope gs-icon"></i>
      <input type="email" id="signupEmail" placeholder="you@example.com">
    </div>
    <div class="gs-field">
      <i class="fas fa-phone gs-icon"></i>
      <input type="tel" id="signupPhone" placeholder="Phone number">
    </div>
    <div class="gs-field">
      <i class="fas fa-lock gs-icon"></i>
      <input type="password" id="signupPassword" placeholder="Password (min. 4 characters)">
    </div>
    <div class="gs-field">
      <i class="fas fa-lock gs-icon"></i>
      <input type="password" id="signupConfirm" placeholder="Confirm password">
    </div>
    <div>
      <p class="gs-role-label">I am a</p>
      <div class="gs-role-grid">
        <div class="gs-role selected" id="role-farmer" onclick="selectRole('farmer')">
          <i class="fas fa-tractor"></i><span>Farmer</span>
        </div>
        <div class="gs-role" id="role-buyer" onclick="selectRole('buyer')">
          <i class="fas fa-store"></i><span>Buyer</span>
        </div>
      </div>
    </div>
    <div class="gs-error" id="signupError"></div>
    <button class="gs-btn" onclick="doSignup()">Create account</button>
    <p class="gs-link">Already have an account? <a href="#" onclick="switchTab('login')">Log in</a></p>
  </div>
</div>

<!-- Verification popup script -->
<script src="/GrameenSetu/assets/js/verification.js"></script>

<script>
  // ==================== CLEAR AUTOFILL ON LOAD ====================
  window.addEventListener('DOMContentLoaded', function() {
    // Force clear any autofilled values
    const emailField = document.getElementById('loginEmail');
    const pwdField = document.getElementById('loginPassword');
    if (emailField) emailField.value = '';
    if (pwdField) pwdField.value = '';
    
    // Also remove readonly trick – just ensure fields are empty
    // Additional: reset form if needed
    document.getElementById('form-login').reset();
  });

  // ==================== TABS ====================
  function switchTab(tab) {
    document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
    document.getElementById('form-signup').classList.toggle('hidden', tab !== 'signup');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('loginError').textContent = '';
    document.getElementById('signupError').textContent = '';
    
    // Clear login fields when switching to login tab
    if (tab === 'login') {
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
    }
  }

  // ==================== ROLE ====================
  let selectedRole = 'farmer';
  function selectRole(role) {
    selectedRole = role;
    document.getElementById('role-farmer').classList.toggle('selected', role === 'farmer');
    document.getElementById('role-buyer').classList.toggle('selected', role === 'buyer');
  }

  // ==================== LOGIN ====================
  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const pwd = document.getElementById('loginPassword').value.trim();
    const err = document.getElementById('loginError');
    err.className = 'gs-error';
    err.textContent = '';

    if (!email || !pwd) {
      err.textContent = 'Email and password are required.';
      return;
    }

    const formData = new FormData();
    formData.append('email', email);
    formData.append('password', pwd);

    try {
      const response = await fetch('/GrameenSetu/api/login_new.php', {
        method: 'POST',
        body: formData
      });
      const data = await response.json();

      if (data.status === 'success') {
        localStorage.setItem('logged_user', JSON.stringify(data.user));
        window.location.href = 'index.html';
      } 
      else if (data.needs_verification) {
        if (data.verification_code) window._lastVerificationCode = data.verification_code;
        VerificationPopup.create(data.user_id, data.email, () => {
          err.className = 'gs-error success';
          err.textContent = '✓ Email verified! Logging you in...';
          setTimeout(() => {
            doLogin();
          }, 1000);
        });
      } 
      else {
        err.textContent = data.message || 'Login failed. Please try again.';
      }
    } catch (error) {
      console.error('Login error:', error);
      err.textContent = 'Network error. Please try again.';
    }
  }

  // ==================== SIGNUP ====================
  async function doSignup() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim().toLowerCase();
    const phone = document.getElementById('signupPhone').value.trim();
    const pwd = document.getElementById('signupPassword').value.trim();
    const confirm = document.getElementById('signupConfirm').value.trim();
    const err = document.getElementById('signupError');
    err.className = 'gs-error';
    err.textContent = '';

    if (!name || !email || !phone || !pwd || !confirm) {
      err.textContent = 'All fields are required.';
      return;
    }
    if (pwd !== confirm) {
      err.textContent = 'Passwords do not match.';
      return;
    }
    if (pwd.length < 4) {
      err.textContent = 'Password must be at least 4 characters.';
      return;
    }

    const formData = new FormData();
    formData.append('full_name', name);
    formData.append('email', email);
    formData.append('phone_number', phone);
    formData.append('password', pwd);
    formData.append('role', selectedRole);

    try {
      const response = await fetch('/GrameenSetu/api/signup_new.php', {
        method: 'POST',
        body: formData
      });
      
      if (!response.ok) {
        err.textContent = `Server error (${response.status}). Please try again.`;
        return;
      }
      
      let data;
      try {
        data = await response.json();
      } catch (parseError) {
        console.error('JSON Parse error:', parseError);
        const text = await response.text();
        console.error('Raw response:', text.substring(0, 200));
        err.textContent = 'Server returned invalid response. Please check console and try again.';
        return;
      }

      if (data.status === 'success') {
        if (data.verification_code) {
          window._lastVerificationCode = data.verification_code;
        }
        VerificationPopup.create(data.user_id, data.email, () => {
          err.className = 'gs-error success';
          err.textContent = '✓ Account verified! Redirecting to login...';
          
          document.getElementById('signupName').value = '';
          document.getElementById('signupEmail').value = '';
          document.getElementById('signupPhone').value = '';
          document.getElementById('signupPassword').value = '';
          document.getElementById('signupConfirm').value = '';
          
          document.getElementById('loginEmail').value = email;
          document.getElementById('loginPassword').value = pwd;
          switchTab('login');
          
          setTimeout(() => {
            doLogin();
          }, 1500);
        });
      } else {
        err.textContent = data.message || 'Registration failed. Please try again.';
      }
    } catch (error) {
      console.error('Signup error:', error);
      err.textContent = 'Network error. Please try again. Check console for details.';
    }
  }

  // Allow Enter key to submit active form
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('form-login').classList.contains('hidden')) {
      doLogin();
    } else {
      doSignup();
    }
  });
</script>
</body>
</html>
